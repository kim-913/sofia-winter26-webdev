<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Bliss — Test Suite</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #FAF8F5; color: #2C2C2C; }
    h1   { font-family: Georgia, serif; color: #8B7BB5; margin-bottom: 8px; }
    p.meta { color: #6B6B6B; margin-bottom: 32px; }
    .summary { padding: 16px 20px; border-radius: 8px; margin-bottom: 24px; font-weight: bold; font-size: 1.1rem; }
    .summary.all-pass { background: #B8E6D5; color: #1a6b40; }
    .summary.some-fail{ background: #fdd; color: #c0392b; }
    .test { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; }
    .test.pass { background: #eafaf3; border-left: 4px solid #27ae60; }
    .test.fail { background: #fdf0ef; border-left: 4px solid #c0392b; }
    .icon { font-size: 1.2rem; flex-shrink: 0; }
    .desc { font-weight: bold; }
    .err  { font-size: 0.875rem; color: #c0392b; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Bubble Bliss — Test Suite</h1>
  <p class="meta">8 automated tests · Form validation · Filter logic · Data integrity</p>

  <div id="summary" class="summary"></div>
  <div id="results"></div>

  <script src="tests.js"></script>
  <script>
    const res     = window.__testResults || [];
    const passed  = res.filter(r => r.pass).length;
    const failed  = res.length - passed;

    const summary = document.getElementById('summary');
    summary.textContent = `${passed} / ${res.length} tests passed` + (failed > 0 ? ` — ${failed} failed` : ' — All green! ✓');
    summary.className   = 'summary ' + (failed === 0 ? 'all-pass' : 'some-fail');

    const container = document.getElementById('results');
    res.forEach(r => {
      const el = document.createElement('div');
      el.className = 'test ' + (r.pass ? 'pass' : 'fail');
      el.innerHTML = `
        <span class="icon">${r.pass ? '✓' : '✗'}</span>
        <div>
          <div class="desc">${r.description}</div>
          ${r.error ? `<div class="err">${r.error}</div>` : ''}
        </div>`;
      container.appendChild(el);
    });
  </script>
</body>
</html>
